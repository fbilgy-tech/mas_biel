<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_OVERRIDE // MAS_BIEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; background: transparent; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background Particle Canvas */
        #heart-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.7;
        }

        /* Terminal UI Box */
        .terminal {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
            padding: 45px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-left: 4px solid #ff004c;
            box-shadow: -20px 0 60px rgba(255, 0, 76, 0.2);
            border-radius: 4px;
        }

        .sys-label {
            color: #555;
            font-size: 0.7rem;
            letter-spacing: 6px;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .target-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 45px;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #ffffff, #ff004c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 0, 76, 0.3);
        }

        /* Message Logic */
        .message-line {
            font-size: 1.15rem;
            line-height: 1.9;
            opacity: 0;
            transform: translateY(15px);
            margin-bottom: 18px;
        }

        .highlight { 
            color: #ff004c; 
            font-weight: 700; 
            text-shadow: 0 0 15px rgba(255, 0, 76, 0.6); 
        }

        /* Typing Animations */
        .l1 { animation: fadeInUp 1s forwards 1.2s; }
        .l2 { animation: fadeInUp 1s forwards 3.5s; }
        .l3 { animation: fadeInUp 1s forwards 5.8s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Blinking Cursor */
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.3rem;
            background: #ff004c;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 8px;
            box-shadow: 0 0 10px #ff004c;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .footer {
            margin-top: 50px;
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="heart-canvas"></canvas>

    <div class="terminal">
        <div class="sys-label">AUTH_LEVEL: ROOT // DEV_BY: BIEL07</div>
        
        <div class="target-name">WIWIT ANISA</div>
        
        <div class="message-box">
            <div class="message-line l1">Kemarin aku lolos audisi Boyband.</div>
            <div class="message-line l2">Tapi aku batalin...</div>
            <div class="message-line l3">
                soalnya aku lebih suka jadi <span class="highlight">Boyfriend</span> kamu.<span class="cursor"></span>
            </div>
        </div>

        <div class="footer">ENCRYPTED_WITH_LOVE // SINCE_2026</div>
    </div>

    <script>
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        const heartPoints = [];

        // Inisialisasi Ukuran
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            heartPoints.length = 0;
            // Rumus Matematika Jantung (Cardioid)
            for (let t = 0; t <= Math.PI * 2; t += 0.08) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                heartPoints.push({ x: x * 16, y: y * 16 });
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                const target = heartPoints[Math.floor(Math.random() * heartPoints.length)];
                this.x = width / 2;
                this.y = height / 2;
                this.targetX = target.x + width / 2;
                this.targetY = target.y + height / 2;
                this.speed = 0.03 + Math.random() * 0.04;
                this.alpha = Math.random();
                this.color = Math.random() > 0.3 ? "#ff004c" : "#ffffff";
                this.size = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                this.alpha -= 0.004;
                if (this.alpha <= 0) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function setup() {
            init();
            for (let i = 0; i < 400; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        
        setup();
        animate();
    </script>
</body>
</html>
