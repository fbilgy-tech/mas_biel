<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNTUK WIWIT ANISA ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .falling-elements {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            width: 85%;
            max-width: 500px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            animation: fadeInCard 2s ease-out;
        }

        .name-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 2px 2px 15px rgba(214, 51, 132, 0.4);
            margin-bottom: 5px;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: #fff;
            margin: 25px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .message-box {
            color: #fff;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        .message-line {
            opacity: 0;
            transform: translateY(20px);
            margin-bottom: 15px;
        }

        .highlight {
            font-weight: 600;
            color: #d63384;
            background: rgba(255, 255, 255, 0.6);
            padding: 3px 10px;
            border-radius: 8px;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .l1 { animation: showMsg 1s forwards 1.5s; }
        .l2 { animation: showMsg 1s forwards 4s; }
        .l3 { animation: showMsg 1s forwards 6.5s; }

        @keyframes showMsg {
            to { opacity: 1; transform: translateY(0); }
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 3px;
            font-weight: 600;
        }

        /* Hidden Music Player */
        #music-player {
            display: none;
        }
    </style>
</head>
<body>

    <div class="falling-elements" id="fallZone"></div>

    <iframe id="music-player" width="0" height="0" src="https://www.youtube.com/embed/CIRSQrkhehM?autoplay=1&loop=1&playlist=CIRSQrkhehM" frameborder="0" allow="autoplay"></iframe>

    <div class="glass-card">
        <div class="name-title">Wiwit Anisa</div>
        
        <div class="divider"></div>

        <div class="message-box">
            <p class="message-line l1">Kata orang, sistem paling hebat adalah yang punya <span class="highlight">Uptime</span> 100%.</p>
            <p class="message-line l2">Sama seperti hatiku...</p>
            <p class="message-line l3">Yang nggak akan pernah <span class="highlight">Down</span> kalau tujuannya cuma menyayangimu selamanya.</p>
        </div>

        <div class="footer">ENCRYPTED WITH LOVE BY BIEL07</div>
    </div>

    <script>
        function createHeart() {
            const elements = ['❤️', '🌸', '✨', '💖'];
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = elements[Math.floor(Math.random() * elements.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            
            document.getElementById('fallZone').appendChild(heart);
            
            const duration = Math.random() * 3000 + 6000;
            heart.animate([
                { transform: 'translateY(-10vh) rotate(0deg)', opacity: 1 },
                { transform: `translateY(110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: duration,
                iterations: 1
            });

            setTimeout(() => { heart.remove(); }, duration);
        }

        setInterval(createHeart, 400);

        // Trick agar musik jalan (biasanya butuh interaksi user pertama kali)
        window.addEventListener('click', function() {
            const player = document.getElementById('music-player');
            player.src += "&autoplay=1";
        }, { once: true });
    </script>
</body>
</html>
