<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIEL_SOFT_OVERRIDE 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Fira+Code:wght@400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; background: transparent; }

        body {
            background-color: #fff0f5; /* Lavender Blush */
            color: #d63384;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #heart-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 2px solid #ffb6c1;
            text-align: center;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1);
        }

        .header-tag {
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: #ff85a1;
            margin-bottom: 20px;
            display: block;
        }

        .target-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message-box {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #594d5b;
        }

        .line {
            opacity: 0;
            transform: scale(0.9);
            margin-bottom: 15px;
        }

        .highlight {
            color: #ff4d6d;
            font-weight: 700;
            padding: 0 5px;
            border-bottom: 2px dashed #ff4d6d;
        }

        /* Animations */
        .l1 { animation: popIn 0.8s forwards 1s; }
        .l2 { animation: popIn 0.8s forwards 3s; }
        .l3 { animation: popIn 0.8s forwards 5s; }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .floating-emoji {
            position: absolute;
            font-size: 24px;
            z-index: 5;
            animation: float 4s infinite ease-in;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #ffb6c1;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <canvas id="heart-canvas"></canvas>

    <div class="container">
        <span class="header-tag">system.overflow("LOVE")</span>
        
        <h1 class="target-name">WIWIT ANISA</h1>

        <div class="message-box">
            <p class="line l1">Tahu nggak kenapa aku suka <span class="highlight">ngoding</span>?</p>
            <p class="line l2">Karena aku terbiasa mencari solusi...</p>
            <p class="line l3">Tapi buat urusan bahagia, solusinya cuma ada di <span class="highlight">kamu</span>. 🧸</p>
        </div>

        <div class="footer">MADE WITH 💖 BY MAS_BIEL</div>
    </div>

    <script>
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const heartPoints = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            heartPoints.length = 0;
            for (let t = 0; t <= Math.PI * 2; t += 0.1) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                heartPoints.push({ x: x * 12, y: y * 12 });
            }
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                const target = heartPoints[Math.floor(Math.random() * heartPoints.length)];
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.targetX = target.x + canvas.width / 2;
                this.targetY = target.y + canvas.height / 2;
                this.color = ["#ff4d6d", "#ff85a1", "#ffb6c1", "#ffccd5"][Math.floor(Math.random() * 4)];
                this.size = Math.random() * 3 + 1;
                this.alpha = Math.random();
                this.speed = 0.02 + Math.random() * 0.03;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                this.alpha -= 0.005;
                if (this.alpha <= 0) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createEmoji() {
            const emojis = ['💖', '✨', '🌸', '🎀', '🍭'];
            const e = document.createElement('div');
            e.className = 'floating-emoji';
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 4000);
        }

        function setup() {
            init();
            for (let i = 0; i < 200; i++) particles.push(new Particle());
            setInterval(createEmoji, 500);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        setup();
        animate();
    </script>
</body>
</html>
