<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNTUK WIWIT ANISA ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Overlay Awal agar Audio Bisa Autoplay */
        #tap-to-open {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ff9a9e;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: 0.8s;
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 85%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: none; /* Muncul setelah klik */
        }

        .target-name {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(214, 51, 132, 0.3);
        }

        .message-box {
            color: #fff;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        .line {
            opacity: 0;
            transform: translateY(20px);
            margin-bottom: 15px;
            transition: 1s all ease;
        }

        .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        .highlight {
            color: #d63384;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 8px;
            border-radius: 5px;
        }

        .heart {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
        }
    </style>
</head>
<body onclick="mulaiRomansa()">

    <audio id="bg-music" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <div id="tap-to-open">
        <p style="font-size: 3rem; margin-bottom: 10px;">🎁</p>
        <p style="font-weight: 600;">Ada pesan buat kamu, klik ya...</p>
    </div>

    <div class="container" id="mainContainer">
        <h1 class="target-name">Wiwit Anisa</h1>
        
        <div class="message-box">
            <p class="line" id="l1">Tahu nggak kenapa aku suka <span class="highlight">ngoding</span>?</p>
            <p class="line" id="l2">Karena aku terbiasa mencari solusi...</p>
            <p class="line" id="l3">Tapi buat urusan bahagia, solusinya cuma ada di <span class="highlight">kamu</span>. 🧸</p>
        </div>

        <div class="footer">ENCRYPTED WITH LOVE BY MAS_BIEL</div>
    </div>

    <script>
        function mulaiRomansa() {
            // 1. Play Audio
            const music = document.getElementById('bg-music');
            music.play();

            // 2. Transisi UI
            document.getElementById('tap-to-open').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('tap-to-open').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                tampilkanPesan();
            }, 800);

            // 3. Efek Hati Jatuh
            setInterval(createHeart, 300);
        }

        function tampilkanPesan() {
            setTimeout(() => document.getElementById('l1').classList.add('show'), 500);
            setTimeout(() => document.getElementById('l2').classList.add('show'), 3000);
            setTimeout(() => document.getElementById('l3').classList.add('show'), 5500);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.opacity = Math.random();
            
            const duration = Math.random() * 3 + 4;
            heart.style.animationDuration = duration + 's';
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }
    </script>
</body>
</html>
