<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNTUK WIWIT ANISA ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Gradasi warna senja romantis */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Kelopak Bunga/Hati Jatuh */
        .falling-elements {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            width: 85%;
            max-width: 500px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            animation: fadeInCard 2s ease-out;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #fff;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: heartBeat 2s infinite;
        }

        .name-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(214, 51, 132, 0.4);
            margin-bottom: 10px;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: #fff;
            margin: 20px auto;
            border-radius: 2px;
        }

        .message-box {
            color: #fff;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .message-line {
            opacity: 0;
            transform: translateY(20px);
        }

        .highlight {
            font-weight: 600;
            color: #d63384;
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 8px;
            border-radius: 5px;
        }

        /* Animations */
        @keyframes fadeInCard {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .l1 { animation: showMsg 1s forwards 1.5s; }
        .l2 { animation: showMsg 1s forwards 4s; }
        .l3 { animation: showMsg 1s forwards 6.5s; }

        @keyframes showMsg {
            to { opacity: 1; transform: translateY(0); }
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="falling-elements" id="fallZone"></div>

    <div class="glass-card">
        <div class="name-title">Wiwit Anisa</div>
        
        <div class="divider"></div>

        <div class="message-box">
            <p class="message-line l1">Kata orang, sistem yang paling hebat itu adalah yang punya <span class="highlight">Uptime</span> 100%.</p>
            <p class="message-line l2">Sama seperti hatiku...</p>
            <p class="message-line l3">Yang nggak akan pernah <span class="highlight">Down</span> kalau tujuannya cuma menyayangimu selamanya.</p>
        </div>

        <div class="footer">Locked Forever by Biel07.Dev</div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️'; // Bisa diganti 🌸 atau ✨
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.duration = (Math.random() * 3 + 4) + 's';
            heart.style.opacity = Math.random();
            
            document.getElementById('fallZone').appendChild(heart);
            
            heart.animate([
                { transform: 'translateY(-10vh) rotate(0deg)' },
                { transform: `translateY(110vh) rotate(${Math.random() * 360}deg)` }
            ], {
                duration: Math.random() * 3000 + 5000,
                iterations: 1
            });

            setTimeout(() => {
                heart.remove();
            }, 8000);
        }

        setInterval(createHeart, 300);
    </script>
</body>
</html>
