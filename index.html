<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIEL_HEART_OVERRIDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; background: transparent; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animasi Background Jantung Berdetak */
        #heart-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        .terminal {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.7); /* Transparansi biar animasi kelihatan */
            backdrop-filter: blur(8px);
            border-left: 3px solid #ff004c;
            box-shadow: -20px 0 50px rgba(255, 0, 76, 0.1);
        }

        .sys-label {
            color: #444;
            font-size: 0.7rem;
            letter-spacing: 5px;
            margin-bottom: 25px;
        }

        .target-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #ff004c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message-line {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(10px);
            margin-bottom: 15px;
        }

        .highlight { color: #ff004c; font-weight: 700; text-shadow: 0 0 10px rgba(255, 0, 76, 0.5); }

        /* Animasi Muncul */
        .l1 { animation: fadeInUp 1s forwards 1s; }
        .l2 { animation: fadeInUp 1s forwards 3s; }
        .l3 { animation: fadeInUp 1s forwards 5s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: #ff004c;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .footer {
            margin-top: 40px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <canvas id="heart-canvas"></canvas>

    <div class="terminal">
        <div class="sys-label">CORE_SYSTEM_ACCESS // MAS_BIEL</div>
        
        <div class="target-name">WIWIT ANISA</div>
        
        <div class="message-box">
            <div class="message-line l1">Kemarin aku lolos audisi Boyband.</div>
            <div class="message-line l2">Tapi aku batalin...</div>
            <div class="message-line l3">
                soalnya aku lebih suka jadi <span class="highlight">Boyfriend</span> kamu.<span class="cursor"></span>
            </div>
        </div>

        <div class="footer">ENCRYPTED_WITH_LOVE // 2026</div>
    </div>

    <script>
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const heartPoints = [];

        // Membuat koordinat jantung
        for (let t = 0; t <= Math.PI * 2; t += 0.05) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            heartPoints.push({ x: x * 15, y: y * 15 });
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                const target = heartPoints[Math.floor(Math.random() * heartPoints.length)];
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.targetX = target.x + canvas.width / 2;
                this.targetY = target.y + canvas.height / 2;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.alpha = Math.random();
                this.color = Math.random() > 0.5 ? "#ff004c" : "#ffffff";
            }
            update() {
                this.x += (this.targetX - this.x) * 0.05;
                this.y += (this.targetY - this.y) * 0.05;
                this.alpha -= 0.005;
                if (this.alpha <= 0) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 350; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
